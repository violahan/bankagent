services:
  # ---------------------------------------------------------------------------
  # Ollama – local LLM server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # One-shot init container that pulls the model, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # RuleFetchMCP – credit-policy rules MCP server (port 8000)
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./RuleFetchMCP
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # AnalyseAgent – credit-check analysis A2A server (port 8001)
  # ---------------------------------------------------------------------------
  analyse-agent:
    build:
      context: ./AnalyseAgent
    ports:
      - "8001:8001"
    depends_on:
      mcp-server:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      MCP_URL: http://mcp-server:8000/mcp
      OLLAMA_HOST: http://ollama:11434
      MODEL_ID: qwen2.5

  # ---------------------------------------------------------------------------
  # OrchestratorAgent – interactive bank orchestrator
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./OrchestratorAgent
    depends_on:
      analyse-agent:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    environment:
      ANALYSE_AGENT_URL: http://analyse-agent:8001
      BUREAU_AGENT_URL: http://15.135.186.83:8080
      OLLAMA_HOST: http://ollama:11434
      MODEL_ID: qwen2.5
    stdin_open: true
    tty: true

volumes:
  ollama_data:
